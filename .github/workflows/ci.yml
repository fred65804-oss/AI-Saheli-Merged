name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # tests/conftest.py blanks every API key before Settings loads, so this
      # runs fully offline — no secrets needed in CI.
      - run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Report-only for now (see DEVSECOPS_PLAN.md #3): torch / sentence-
  # transformers / faster-whisper pull in dependency trees that almost always
  # carry some known CVEs. Triage the baseline once, then remove
  # continue-on-error (or add --fail-on / severity flags) to start enforcing.
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (report-only)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip install -r requirements.txt
          pip-audit
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (report-only)
        continue-on-error: true
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level=high
      - name: trivy filesystem scan (report-only)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
